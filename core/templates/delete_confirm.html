{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="card shadow p-5 border-0 mx-auto" style="max-width: 500px;">
        <h2 class="text-danger">Are you sure? 🗑️</h2>
        <p>Kya aap sach mein <strong>"{{ pet.name }}"</strong> ki post ko permanent delete karna chahte hain?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg w-100 mb-2">Yes, Delete it!</button>
            <a href="{% url 'dashboard' %}" class="btn btn-light w-100">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
