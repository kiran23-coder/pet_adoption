<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sign In - Pet Adopt</title>
</head>
<body class="bg-light">
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0 p-4">
                    <h3 class="text-center mb-4">Welcome Back! 👋</h3>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-success w-100 py-2">Sign In</button>
                    </form>
                    <hr>
                    <p class="text-center">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
    <style>
        input { border-radius: 8px; border: 1px solid #ddd; padding: 10px; width: 100%; }
    </style>
</body>
</html>
