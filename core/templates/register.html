<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sign Up - Pet Adopt</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 p-4">
                    <h2 class="text-center fw-bold mb-4 text-primary">Create Account 🐾</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}
                                <div class="text-danger small">{{ field.errors }}</div>
                            </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Register Now</button>
                    </form>
                    <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
    <style>
        input { border-radius: 8px; border: 1px solid #ddd; padding: 10px; width: 100%; }
    </style>
</body>
</html>
